    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "FF14Gils",
        "url": "https://jinwktk.github.io/FF14Gils/",
        "description": "FF14のマーケット売上、相場、販売数から全DCの金策候補を探せるダッシュボードです。",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "inLanguage": "ja-JP",
        "image": "https://jinwktk.github.io/FF14Gils/assets/og-image.png"
      }
    </script>
    <script type="module" src="src/app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="brand-block">
          <div class="brand-copy">
            <p class="eyebrow" data-i18n="ui.eyebrow">FF14 マーケット金策</p>
            <h1>FF14Gils</h1>
            <p class="lead" data-i18n="ui.lead">
              マーケットの売れ行きと相場から、売りやすい金策候補を探せます。
            </p>
          </div>
          <div class="header-actions">
            <label class="language-control">
              <span class="sr-only" data-i18n="ui.languageLabel">表示言語</span>
              <select
                data-language-select
                data-i18n-attr="aria-label:ui.languageSelect"
                aria-label="表示言語を選択"
              >
                <option value="ja">日本語</option>
                <option value="en">English</option>
              </select>
            </label>
          </div>
        </div>
      </header>

      <main class="dashboard-grid">
        <aside
          class="filter-panel controls"
          data-i18n-attr="aria-label:ui.filterPanelLabel"
          aria-label="絞り込み"
        >
          <div class="panel-heading">
            <p class="panel-kicker" data-i18n="ui.filterKicker">条件</p>
            <h2 data-i18n="ui.filterTitle">絞り込み</h2>
            <p data-i18n="ui.filterHelp">DCを選ぶとワールド候補を絞れます。選んだワールドは次回も使えます。</p>
          </div>

          <label>
            <span data-i18n="ui.dataCenterLabel">データセンター</span>
            <select
              data-dc-select
              data-i18n-attr="aria-label:ui.dataCenterSelect"
              aria-label="DCを選択"
            ></select>
          </label>

          <label>
            <span data-i18n="ui.worldLabel">ワールド</span>
            <select
              data-world-select
              data-i18n-attr="aria-label:ui.worldSelect"
              aria-label="ワールドを選択"
            ></select>
          </label>

          <label>
            <span data-i18n="ui.periodLabel">集計期間</span>
            <select
              data-period-select
              data-i18n-attr="aria-label:ui.periodSelect"
              aria-label="売上の集計期間"
            >
              <option value="1d">1日</option>
              <option value="3d">3日</option>
              <option value="7d">7日</option>
            </select>
          </label>

          <label>
            <span data-i18n="ui.itemSearch">アイテム検索</span>
            <input
              data-search
              type="search"
              data-i18n-attr="placeholder:ui.searchPlaceholder;aria-label:ui.searchLabel"
              placeholder="日本語名・英語名・ID"
              aria-label="アイテム検索"
              autocomplete="off"
            />
          </label>

          <label>
            <span data-i18n="ui.sortLabel">並び替え</span>
            <select data-sort-by>
              <option value="opportunityScore" data-i18n="sort.opportunityScore">おすすめ度</option>
              <option value="name" data-i18n="sort.name">アイテム名</option>
              <option value="marketValue" data-i18n="sort.marketValue">売上額</option>
              <option value="quantitySold" data-i18n="sort.quantitySold">売れた数</option>
              <option value="avg" data-i18n="sort.avg">平均価格</option>
              <option value="minPrice" data-i18n="sort.minPrice">最安値</option>
              <option value="percentChange" data-i18n="sort.percentChange">価格変動</option>
              <option value="state" data-i18n="sort.state">状態</option>
            </select>
          </label>

          <label class="range-control">
            <span data-i18n="ui.minQuantity">最低販売数</span>
            <span data-min-quantity-value>0</span>
            <input data-min-quantity type="range" min="0" max="100" step="1" value="0" />
          </label>

          <fieldset>
            <legend data-i18n="ui.stateLegend">状態</legend>
            <label><input data-state-filter type="checkbox" value="stable" /> <span data-i18n="states.stable">安定</span></label>
            <label><input data-state-filter type="checkbox" value="increasing" /> <span data-i18n="states.increasing">上昇中</span></label>
            <label><input data-state-filter type="checkbox" value="spiking" /> <span data-i18n="states.spiking">急騰</span></label>
            <label><input data-state-filter type="checkbox" value="out of stock" /> <span data-i18n="states.out_of_stock">在庫なし</span></label>
            <label><input data-state-filter type="checkbox" value="decreasing" /> <span data-i18n="states.decreasing">値下がり</span></label>
          </fieldset>
        </aside>

        <section
          class="results-panel results"
          data-i18n-attr="aria-label:ui.resultsLabel"
          aria-label="金策候補"
        >
          <p data-error class="error" hidden></p>
          <div class="results-header">
            <div>
              <p class="panel-kicker" data-i18n="ui.resultsKicker">結果</p>
              <h2 data-i18n="ui.resultsTitle">金策候補</h2>
            </div>
            <div class="results-actions">
              <div
                class="view-tabs"
                role="tablist"
                data-i18n-attr="aria-label:view.tabsLabel"
                aria-label="表示切替"
              >
                <button
                  type="button"
                  role="tab"
                  data-view-tab="table"
                  aria-selected="true"
                  data-i18n="view.table"
                >一覧</button>
                <button
                  type="button"
                  role="tab"
                  data-view-tab="charts"
                  aria-selected="false"
                  data-i18n="view.charts"
                >グラフ</button>
              </div>
              <div class="result-meta">
                <span data-result-count>- 件</span>
                <span class="updated-at" data-updated-at>最終更新 -</span>
              </div>
            </div>
          </div>
          <div data-table-panel>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th scope="col" aria-sort="descending">
                      <button type="button" class="sort-button" data-sort-button="opportunityScore">
                        <span data-i18n="table.rank">順位</span><span class="sort-indicator" aria-hidden="true"></span>
                      </button>
                    </th>
                    <th scope="col" aria-sort="none">
                      <button type="button" class="sort-button" data-sort-button="name">
                        <span data-i18n="table.item">アイテム</span><span class="sort-indicator" aria-hidden="true"></span>
                      </button>
                    </th>
                    <th scope="col" aria-sort="none">
                      <button type="button" class="sort-button" data-sort-button="marketValue">
                        <span data-i18n="table.marketValue">売上額</span><span class="sort-indicator" aria-hidden="true"></span>
                      </button>
                    </th>
                    <th scope="col" aria-sort="none">
                      <button type="button" class="sort-button" data-sort-button="avg">
                        <span data-i18n="table.avg">平均価格</span><span class="sort-indicator" aria-hidden="true"></span>
                      </button>
                    </th>
                    <th scope="col" aria-sort="none">
                      <button type="button" class="sort-button" data-sort-button="minPrice">
                        <span data-i18n="table.minPrice">最安値</span><span class="sort-indicator" aria-hidden="true"></span>
                      </button>
                    </th>
                    <th scope="col" aria-sort="none">
                      <button type="button" class="sort-button" data-sort-button="quantitySold">
                        <span data-i18n="table.quantitySold">売れた数</span><span class="sort-indicator" aria-hidden="true"></span>
                      </button>
                    </th>
                    <th scope="col" aria-sort="none">
                      <button type="button" class="sort-button" data-sort-button="percentChange">
                        <span data-i18n="table.percentChange">価格変動</span><span class="sort-indicator" aria-hidden="true"></span>
                      </button>
                    </th>
                    <th scope="col" aria-sort="none">
                      <button type="button" class="sort-button" data-sort-button="state">
                        <span data-i18n="table.state">状態</span><span class="sort-indicator" aria-hidden="true"></span>
                      </button>
                    </th>
                  </tr>
                </thead>
                <tbody data-results></tbody>
              </table>
            </div>
          </div>

          <section class="chart-panel" data-chart-panel hidden>
            <div class="money-metrics" data-money-flow-summary>
              <div class="metric-block">
                <span data-i18n="chart.totalSales">売上合計</span>
                <strong data-money-total>-</strong>
              </div>
              <div class="metric-block">
                <span data-i18n="chart.soldQuantity">販売数</span>
                <strong data-money-quantity>-</strong>
              </div>
              <div class="metric-block">
                <span data-i18n="chart.averageSales">平均売上</span>
                <strong data-money-average>-</strong>
              </div>
              <div class="metric-block">
                <span data-i18n="chart.itemCount">対象アイテム</span>
                <strong data-money-items>-</strong>
              </div>
            </div>
            <div class="chart-grid">
              <section class="chart-block">
                <h3 data-i18n="chart.topSalesTitle">売上額トップ</h3>
                <div class="bar-chart" data-sales-chart></div>
              </section>
              <section class="chart-block">
                <h3 data-i18n="chart.salesByStateTitle">状態別売上</h3>
                <div class="bar-chart" data-state-chart></div>
              </section>
              <section class="chart-block chart-block-wide">
                <h3 data-i18n="chart.priceChangeTitle">価格変動</h3>
                <div class="bar-chart" data-price-change-chart></div>
              </section>
            </div>
          </section>
        </section>
      </main>

      <footer class="site-footer">
        <a href="legal.html">権利表記とデータについて</a>
      </footer>
    </div>
  </body>
</html>
