    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "FF14Gils",
        "url": "https://jinwktk.github.io/FF14Gils/",
        "description": "FF14のマーケット売上、相場、販売数から金策候補を探せるダッシュボードです。",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "inLanguage": "ja-JP",

        "sameAs": ["https://ko-fi.com/jinnymeia"]
      }
    </script>

  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="brand-block">
          <div class="brand-copy">
            <p class="eyebrow">FF14 マーケット金策</p>
            <h1>FF14Gils</h1>
            <p class="lead">
              マーケットの売れ行きと相場から、売りやすい金策候補を探せます。
            </p>
          </div>
          <div class="header-actions">
            <a
              class="kofi-link"
              href="https://ko-fi.com/jinnymeia"
              target="_blank"
              rel="me noopener noreferrer"
              aria-label="Ko-fiで支援する"
              title="Ko-fi"
            >
              <img src="assets/ko-fi.svg" width="28" height="28" alt="" aria-hidden="true" />
              <span class="sr-only">Ko-fiで支援する</span>
            </a>
          </div>
        </div>
      </header>

      <main class="dashboard-grid">
        <aside class="filter-panel controls" aria-label="絞り込み">
          <div class="panel-heading">
            <p class="panel-kicker">条件</p>
            <h2>絞り込み</h2>
            <p>選んだワールドは次回も使えます。</p>
          </div>

          <label>
            ワールド
            <select data-world-select aria-label="ワールドを選択"></select>
          </label>

          <label>
            集計期間
            <select data-period-select aria-label="売上の集計期間">
              <option value="1d">1日</option>
              <option value="3d">3日</option>
              <option value="7d">7日</option>
              <option value="30d">1か月</option>
            </select>
          </label>

          <label>
            アイテム検索
            <input
              data-search
              type="search"
              placeholder="日本語名・英語名・ID"
              autocomplete="off"
            />
          </label>

          <label>
            並び替え
            <select data-sort-by>
              <option value="opportunityScore">おすすめ度</option>
              <option value="name">アイテム名</option>
              <option value="marketValue">売上額</option>
              <option value="quantitySold">売れた数</option>
              <option value="avg">平均価格</option>
              <option value="minPrice">最安値</option>
              <option value="percentChange">価格変動</option>
              <option value="state">状態</option>
            </select>
          </label>

          <label class="range-control">
            最低販売数 <span data-min-quantity-value>0</span>
            <input data-min-quantity type="range" min="0" max="100" step="1" value="0" />
          </label>

          <fieldset>
            <legend>状態</legend>
            <label><input data-state-filter type="checkbox" value="stable" /> 安定</label>
            <label><input data-state-filter type="checkbox" value="increasing" /> 上昇中</label>
            <label><input data-state-filter type="checkbox" value="spiking" /> 急騰</label>
            <label><input data-state-filter type="checkbox" value="out of stock" /> 在庫なし</label>
            <label><input data-state-filter type="checkbox" value="decreasing" /> 値下がり</label>
          </fieldset>
        </aside>

        <section class="results-panel results" aria-label="金策候補">
          <p data-error class="error" hidden></p>
          <div class="results-header">
            <div>
              <p class="panel-kicker">一覧</p>
              <h2>金策候補</h2>
            </div>
            <div class="result-meta">
              <span data-result-count>- 件</span>
              <span class="updated-at" data-updated-at>最終更新 -</span>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th scope="col" aria-sort="descending">
                    <button type="button" class="sort-button" data-sort-button="opportunityScore">
                      順位<span class="sort-indicator" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th scope="col" aria-sort="none">
                    <button type="button" class="sort-button" data-sort-button="name">
                      アイテム<span class="sort-indicator" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th scope="col" aria-sort="none">
                    <button type="button" class="sort-button" data-sort-button="marketValue">
                      売上額<span class="sort-indicator" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th scope="col" aria-sort="none">
                    <button type="button" class="sort-button" data-sort-button="avg">
                      平均価格<span class="sort-indicator" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th scope="col" aria-sort="none">
                    <button type="button" class="sort-button" data-sort-button="minPrice">
                      最安値<span class="sort-indicator" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th scope="col" aria-sort="none">
                    <button type="button" class="sort-button" data-sort-button="quantitySold">
                      売れた数<span class="sort-indicator" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th scope="col" aria-sort="none">
                    <button type="button" class="sort-button" data-sort-button="percentChange">
                      価格変動<span class="sort-indicator" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th scope="col" aria-sort="none">
                    <button type="button" class="sort-button" data-sort-button="state">
                      状態<span class="sort-indicator" aria-hidden="true"></span>
                    </button>
                  </th>
                </tr>
              </thead>
              <tbody data-results></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </body>
